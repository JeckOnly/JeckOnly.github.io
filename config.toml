baseURL = "https://jeckonly.github.io/"
languageCode = "zh-cn"
title = "JeckOnly"
theme = "anubis2"
summaryLength = 120
hasCJKLanguage = true
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS"]

[pagination]
  pagerSize = 5

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "categories"
    weight = 80
  [[related.indices]]
    name = "date"
    weight = 10

[markup.goldmark.renderer]
  unsafe = true

[params]
  locale = "zh-cn"
  description = "一个使用 Hugo 与 Anubis2 主题搭建的 GitHub Pages 个人站点。"
  copyright = "JeckOnly"
  dateFormat = "2006-01-02"
  mainSections = ["posts"]

  [params.author]
    name = "JeckOnly"

  [params.anubis2]
    enablecolorthemeswitcher = true
    colortheme = "auto"
    enablecopycodebutton = true
    enablesummary = true
    enablerssicon = false
    readnextposts = 4
    tocwordcount = 0

    [params.anubis2.services]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 20

  [[menu.main]]
    identifier = "categories"
    name = "分类"
    url = "/categories/"
    weight = 30

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40
